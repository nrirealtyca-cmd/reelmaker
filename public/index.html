<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReelMaker — Turn Photos into Reels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0D0D0D;
      --cream: #F5F0EB;
      --coral: #FF6B35;
      --coral-hover: #E55A2B;
      --gray: #8A8A8A;
      --dark-surface: #1A1A1A;
      --card-surface: #222222;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--cream); min-height: 100vh; }
    h1, h2, h3 { font-family: 'Sora', sans-serif; }
    .container { max-width: 960px; margin: 0 auto; padding: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-decoration: none; }
    .btn-primary { background: var(--coral); color: white; }
    .btn-primary:hover { background: var(--coral-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--card-surface); color: var(--cream); border: 1px solid #333; }
    .btn-secondary:hover { background: #2a2a2a; }
    .btn-ghost { background: transparent; color: var(--cream); border: 1px solid #444; }
    .btn-ghost:hover { border-color: var(--coral); color: var(--coral); }
    .btn-sm { padding: 8px 16px; font-size: 14px; border-radius: 8px; }

    /* Photo Grid */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .photo-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .photo-item.selected { border-color: var(--coral); }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-badge { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%; background: var(--coral); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .photo-item .video-badge { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; }

    /* Progress */
    .progress-bar { width: 100%; height: 8px; background: var(--dark-surface); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--coral); border-radius: 4px; transition: width 0.3s ease; }

    /* Video Preview */
    .video-card { background: var(--card-surface); border-radius: 16px; padding: 16px; }
    .video-card video { width: 100%; border-radius: 10px; background: #000; }

    /* Caption Styles */
    .caption-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .caption-tab { padding: 10px 20px; border-radius: 10px; border: 1px solid #333; background: transparent; color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .caption-tab.active { background: var(--coral); border-color: var(--coral); color: white; }
    .caption-tab:hover:not(.active) { border-color: var(--coral); }
    .caption-textarea { width: 100%; min-height: 140px; background: var(--dark-surface); border: 1px solid #333; border-radius: 12px; padding: 14px; color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; resize: vertical; }
    .caption-textarea:focus { outline: none; border-color: var(--coral); }
    .char-count { text-align: right; font-size: 13px; color: var(--gray); margin-top: 6px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--card-surface); color: var(--cream); padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500; border: 1px solid #333; z-index: 100; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* Demo banner */
    .demo-banner { background: var(--card-surface); border: 1px solid #333; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; color: var(--gray); display: flex; align-items: center; gap: 8px; }

    /* Animations */
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .float-emoji { font-size: 32px; animation: float 3s ease-in-out infinite; display: inline-block; }

    /* Responsive */
    @media (max-width: 600px) {
      .photo-grid { grid-template-columns: repeat(3, 1fr); }
      .btn { padding: 12px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── App Root ──────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('landing');
      const [sessionId, setSessionId] = useState(null);
      const [isDemoMode, setIsDemoMode] = useState(false);
      const [selectedItems, setSelectedItems] = useState([]);
      const [jobId, setJobId] = useState(null);
      const [jobData, setJobData] = useState(null);
      const [captionData, setCaptionData] = useState(null);
      const [selectedCaption, setSelectedCaption] = useState('');
      const [toast, setToast] = useState(null);

      // Check URL for session param on mount
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const sid = params.get('session');
        if (sid) {
          setSessionId(sid);
          setScreen('browser');
          window.history.replaceState({}, '', '/');
        }
        const err = params.get('error');
        if (err) {
          showToast('Authentication failed. Try again.');
          window.history.replaceState({}, '', '/');
        }
      }, []);

      function showToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      }

      function handleConnect() {
        setScreen('connecting');
        fetch('/auth/google/url')
          .then(r => r.json())
          .then(data => {
            if (data.authUrl) {
              window.location.href = data.authUrl;
            } else {
              // No OAuth configured — enter demo mode
              setIsDemoMode(true);
              setScreen('browser');
            }
          })
          .catch(() => {
            setIsDemoMode(true);
            setScreen('browser');
          });
      }

      function handleDemoMode() {
        setIsDemoMode(true);
        setScreen('browser');
      }

      function handleGenerate(items) {
        setSelectedItems(items);
        setScreen('processing');
        setCaptionData(null);
        setSelectedCaption('');

        const headers = { 'Content-Type': 'application/json' };
        if (sessionId) headers['x-session-id'] = sessionId;

        // Start video generation
        fetch('/api/generate', {
          method: 'POST',
          headers,
          body: JSON.stringify({ items, photoDuration: 3 })
        })
          .then(r => r.json())
          .then(data => {
            if (data.error) throw new Error(data.error);
            setJobId(data.jobId);
          })
          .catch(err => {
            showToast('Generation failed: ' + err.message);
            setScreen('browser');
          });

        // Start caption generation in parallel
        fetch('/api/captions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items, platform: 'reel' })
        })
          .then(r => r.json())
          .then(data => setCaptionData(data))
          .catch(() => setCaptionData(null));
      }

      function handleDisconnect() {
        if (sessionId) {
          fetch('/api/disconnect', {
            method: 'POST',
            headers: { 'x-session-id': sessionId }
          }).catch(() => {});
        }
        setSessionId(null);
        setIsDemoMode(false);
        setSelectedItems([]);
        setJobId(null);
        setJobData(null);
        setCaptionData(null);
        setSelectedCaption('');
        setScreen('landing');
      }

      function handleStartOver() {
        setSelectedItems([]);
        setJobId(null);
        setJobData(null);
        setCaptionData(null);
        setSelectedCaption('');
        setScreen('browser');
      }

      return (
        <div className="container">
          {screen === 'landing' && (
            <LandingScreen onConnect={handleConnect} onDemo={handleDemoMode} />
          )}
          {screen === 'connecting' && <ConnectingScreen />}
          {screen === 'browser' && (
            <BrowserScreen
              sessionId={sessionId}
              isDemoMode={isDemoMode}
              onGenerate={handleGenerate}
              onDisconnect={handleDisconnect}
            />
          )}
          {screen === 'processing' && (
            <ProcessingScreen
              jobId={jobId}
              onDone={(data) => { setJobData(data); setScreen('captions'); }}
              onError={(msg) => showToast(msg)}
              onRetry={() => handleGenerate(selectedItems)}
            />
          )}
          {screen === 'captions' && (
            <CaptionsScreen
              captionData={captionData}
              selectedItems={selectedItems}
              onUseCaption={(caption) => { setSelectedCaption(caption); setScreen('preview'); }}
              onSkip={() => { setSelectedCaption(''); setScreen('preview'); }}
              onRegenerate={() => {
                setCaptionData(null);
                fetch('/api/captions', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ items: selectedItems, platform: 'reel' })
                })
                  .then(r => r.json())
                  .then(data => setCaptionData(data))
                  .catch(() => setCaptionData(null));
              }}
            />
          )}
          {screen === 'preview' && (
            <PreviewScreen
              jobData={jobData}
              caption={selectedCaption}
              onStartOver={handleStartOver}
              showToast={showToast}
            />
          )}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    // ─── Landing Screen ────────────────────────────────────────
    function LandingScreen({ onConnect, onDemo }) {
      return (
        <div style={{ textAlign: 'center', paddingTop: '15vh' }}>
          <div style={{ marginBottom: 24 }}>
            <span className="float-emoji" style={{ animationDelay: '0s' }}>📸</span>
            <span className="float-emoji" style={{ animationDelay: '0.5s', margin: '0 12px' }}>🎬</span>
            <span className="float-emoji" style={{ animationDelay: '1s' }}>✨</span>
          </div>
          <h1 style={{ fontSize: 42, fontWeight: 700, marginBottom: 12 }}>
            Reel<span style={{ color: 'var(--coral)' }}>Maker</span>
          </h1>
          <p style={{ color: 'var(--gray)', fontSize: 18, marginBottom: 40, maxWidth: 480, margin: '0 auto 40px' }}>
            Turn your Google Photos into Instagram Reels & YouTube Shorts — with AI-powered captions.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'center' }}>
            <button className="btn btn-primary" onClick={onConnect} style={{ fontSize: 18, padding: '16px 40px' }}>
              Connect Google Photos
            </button>
            <button className="btn btn-ghost btn-sm" onClick={onDemo}>
              Try Demo Mode
            </button>
          </div>
        </div>
      );
    }

    // ─── Connecting Screen ─────────────────────────────────────
    function ConnectingScreen() {
      return (
        <div style={{ textAlign: 'center', paddingTop: '25vh' }}>
          <div style={{ fontSize: 48, marginBottom: 20, animation: 'float 2s ease-in-out infinite' }}>🔗</div>
          <h2 style={{ marginBottom: 12 }}>Connecting to Google Photos...</h2>
          <p style={{ color: 'var(--gray)' }}>You'll be redirected to sign in with Google.</p>
        </div>
      );
    }

    // ─── Browser Screen ────────────────────────────────────────
    function BrowserScreen({ sessionId, isDemoMode, onGenerate, onDisconnect }) {
      const [items, setItems] = useState([]);
      const [selected, setSelected] = useState([]);
      const [loading, setLoading] = useState(true);
      const [nextPage, setNextPage] = useState(null);

      useEffect(() => { loadPhotos(); }, []);

      // 12 test photos with full Google Photos-style metadata
      const TEST_PHOTOS = [
        // ── 4 Food ──
        { id: 'test-food-1', filename: 'IMG_20260315_192345_sushi_platter.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-15T19:23:45Z', width: '4032', height: '3024',
            photo: { cameraMake: 'Apple', cameraModel: 'iPhone 15 Pro Max', focalLength: 6.86, apertureFNumber: 1.78, isoEquivalent: 250, exposureTime: '0.02s' }},
          color: '#E63946', label: '🍣 Sushi' },
        { id: 'test-food-2', filename: 'DSC_8821_pasta_carbonara_closeup.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-10T20:15:30Z', width: '6000', height: '4000',
            photo: { cameraMake: 'Nikon', cameraModel: 'Z6 III', focalLength: 50, apertureFNumber: 2.8, isoEquivalent: 800, exposureTime: '0.016s' }},
          color: '#F4A261', label: '🍝 Pasta' },
        { id: 'test-food-3', filename: 'PXL_20260308_brunch_avocado_toast.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-08T10:42:18Z', width: '4080', height: '3072',
            photo: { cameraMake: 'Google', cameraModel: 'Pixel 9 Pro', focalLength: 6.81, apertureFNumber: 1.68, isoEquivalent: 143, exposureTime: '0.008s' }},
          color: '#2A9D8F', label: '🥑 Toast' },
        { id: 'test-food-4', filename: 'IMG_4492_latte_art_rosetta.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-22T08:05:55Z', width: '4032', height: '3024',
            photo: { cameraMake: 'Apple', cameraModel: 'iPhone 16 Pro', focalLength: 2.22, apertureFNumber: 2.2, isoEquivalent: 400, exposureTime: '0.033s' }},
          color: '#6A4C93', label: '☕ Latte' },

        // ── 2 Tourist ──
        { id: 'test-tourist-1', filename: 'DSC_1203_eiffel_tower_golden_hour.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-02-14T17:48:22Z', width: '7360', height: '4912',
            photo: { cameraMake: 'Sony', cameraModel: 'A7R V', focalLength: 24, apertureFNumber: 8, isoEquivalent: 100, exposureTime: '0.004s' }},
          color: '#E9C46A', label: '🗼 Paris' },
        { id: 'test-tourist-2', filename: 'PXL_20260220_kyoto_bamboo_grove.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-02-20T09:15:40Z', width: '4080', height: '3072',
            photo: { cameraMake: 'Google', cameraModel: 'Pixel 9 Pro', focalLength: 6.81, apertureFNumber: 1.68, isoEquivalent: 55, exposureTime: '0.005s' }},
          color: '#264653', label: '🎋 Kyoto' },

        // ── 2 Selfies ──
        { id: 'test-selfie-1', filename: 'IMG_20260305_beach_selfie_sunset.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-05T18:32:10Z', width: '3088', height: '2316',
            photo: { cameraMake: 'Samsung', cameraModel: 'Galaxy S25 Ultra', focalLength: 3.2, apertureFNumber: 2.2, isoEquivalent: 50, exposureTime: '0.001s' }},
          color: '#FF6B35', label: '🤳 Beach' },
        { id: 'test-selfie-2', filename: 'IMG_7720_group_selfie_rooftop_bar.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-18T21:10:45Z', width: '4032', height: '3024',
            photo: { cameraMake: 'Apple', cameraModel: 'iPhone 15 Pro', focalLength: 2.22, apertureFNumber: 1.9, isoEquivalent: 1000, exposureTime: '0.04s' }},
          color: '#1982C4', label: '🎉 Group' },

        // ── 2 Macro / Zoom ──
        { id: 'test-macro-1', filename: 'DSC_3345_dewdrop_on_rose_petal_macro.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-12T07:20:33Z', width: '6000', height: '4000',
            photo: { cameraMake: 'Nikon', cameraModel: 'Z6 III', focalLength: 105, apertureFNumber: 2.8, isoEquivalent: 200, exposureTime: '0.005s' }},
          color: '#E63946', label: '🌹 Macro' },
        { id: 'test-macro-2', filename: 'PXL_20260325_butterfly_wing_detail.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-25T11:55:12Z', width: '4080', height: '3072',
            photo: { cameraMake: 'Google', cameraModel: 'Pixel 9 Pro', focalLength: 6.81, apertureFNumber: 1.68, isoEquivalent: 72, exposureTime: '0.003s' }},
          color: '#8AC926', label: '🦋 Detail' },

        // ── 2 Animals ──
        { id: 'test-animal-1', filename: 'IMG_20260301_golden_retriever_park.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-01T15:40:28Z', width: '4032', height: '3024',
            photo: { cameraMake: 'Apple', cameraModel: 'iPhone 16 Pro', focalLength: 6.86, apertureFNumber: 1.78, isoEquivalent: 64, exposureTime: '0.002s' }},
          color: '#F4A261', label: '🐕 Dog' },
        { id: 'test-animal-2', filename: 'DSC_5510_tabby_cat_window_light.jpg', mimeType: 'image/jpeg',
          mediaMetadata: { creationTime: '2026-03-20T14:22:09Z', width: '6000', height: '4000',
            photo: { cameraMake: 'Sony', cameraModel: 'A7 IV', focalLength: 85, apertureFNumber: 1.8, isoEquivalent: 320, exposureTime: '0.008s' }},
          color: '#457B9D', label: '🐈 Cat' }
      ];

      function loadPhotos(pageToken) {
        setLoading(true);
        if (isDemoMode || !sessionId) {
          // Use test photos with realistic Google Photos metadata
          const demoItems = TEST_PHOTOS.map(p => ({
            ...p,
            thumbnail: `data:image/svg+xml,${encodeURIComponent(
              `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">` +
              `<rect fill="${p.color.replace('#', '%23')}" width="400" height="400"/>` +
              `<text x="200" y="185" text-anchor="middle" fill="white" font-size="40" font-family="sans-serif">${p.label.split(' ')[0]}</text>` +
              `<text x="200" y="230" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="16" font-family="sans-serif">${p.label.split(' ')[1] || ''}</text>` +
              `<text x="200" y="265" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="sans-serif">${p.mediaMetadata.photo.cameraMake} ${p.mediaMetadata.photo.cameraModel}</text></svg>`
            )}`,
            isMock: true
          }));
          setItems(demoItems);
          setLoading(false);
          return;
        }
        const url = '/api/photos' + (pageToken ? `?pageToken=${pageToken}` : '');
        fetch(url, { headers: { 'x-session-id': sessionId } })
          .then(r => r.json())
          .then(data => {
            setItems(prev => pageToken ? [...prev, ...data.items] : data.items);
            setNextPage(data.nextPageToken);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }

      function toggleSelect(item) {
        setSelected(prev => {
          const exists = prev.find(s => s.id === item.id);
          if (exists) return prev.filter(s => s.id !== item.id);
          if (prev.length >= 10) return prev;
          return [...prev, item];
        });
      }

      const selIdx = (id) => selected.findIndex(s => s.id === id);

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h2 style={{ fontSize: 24 }}>
              {isDemoMode ? 'Demo' : 'Your'} Photos
              <span style={{ fontSize: 14, fontWeight: 400, color: 'var(--gray)', marginLeft: 8 }}>
                {selected.length}/10 selected
              </span>
            </h2>
            <div style={{ display: 'flex', gap: 8 }}>
              {selected.length >= 2 && (
                <button className="btn btn-primary btn-sm" onClick={() => onGenerate(selected)}>
                  Generate Videos ({selected.length})
                </button>
              )}
              <button className="btn btn-ghost btn-sm" onClick={onDisconnect}>
                {isDemoMode ? 'Exit Demo' : 'Disconnect'}
              </button>
            </div>
          </div>

          {isDemoMode && (
            <div className="demo-banner">
              🎨 Demo mode — using colored placeholders. Connect Google Photos for real media.
            </div>
          )}

          {selected.length < 2 && selected.length > 0 && (
            <div className="demo-banner">Select at least 2 photos to generate a video.</div>
          )}

          <div className="photo-grid">
            {items.map(item => {
              const idx = selIdx(item.id);
              return (
                <div
                  key={item.id}
                  className={`photo-item ${idx >= 0 ? 'selected' : ''}`}
                  onClick={() => toggleSelect(item)}
                >
                  <img src={item.thumbnail} alt={item.filename} loading="lazy" />
                  {idx >= 0 && <div className="photo-badge">{idx + 1}</div>}
                  {item.mimeType && item.mimeType.startsWith('video/') && (
                    <div className="video-badge">▶ Video</div>
                  )}
                </div>
              );
            })}
          </div>

          {loading && <p style={{ textAlign: 'center', color: 'var(--gray)', marginTop: 20 }}>Loading...</p>}

          {nextPage && !loading && (
            <div style={{ textAlign: 'center', marginTop: 20 }}>
              <button className="btn btn-secondary btn-sm" onClick={() => loadPhotos(nextPage)}>
                Load More
              </button>
            </div>
          )}
        </div>
      );
    }

    // ─── Processing Screen ─────────────────────────────────────
    function ProcessingScreen({ jobId, onDone, onError, onRetry }) {
      const [status, setStatus] = useState('Starting...');
      const [progress, setProgress] = useState(0);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!jobId) return;
        const interval = setInterval(() => {
          fetch(`/api/generate/${jobId}`)
            .then(r => r.json())
            .then(data => {
              setStatus(data.status);
              setProgress(data.progress || 0);

              if (data.status === 'done') {
                clearInterval(interval);
                onDone(data);
              } else if (data.status === 'error') {
                clearInterval(interval);
                setError(data.error || 'Unknown error');
              }
            })
            .catch(() => {});
        }, 1000);

        return () => clearInterval(interval);
      }, [jobId]);

      if (error) {
        return (
          <div style={{ textAlign: 'center', paddingTop: '20vh' }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>⚠️</div>
            <h2 style={{ marginBottom: 12 }}>Generation Failed</h2>
            <p style={{ color: 'var(--gray)', marginBottom: 24, maxWidth: 500, margin: '0 auto 24px', fontSize: 14, wordBreak: 'break-word' }}>{error}</p>
            <button className="btn btn-primary" onClick={onRetry}>Retry</button>
          </div>
        );
      }

      return (
        <div style={{ textAlign: 'center', paddingTop: '20vh' }}>
          <div style={{ fontSize: 48, marginBottom: 16, animation: 'float 2s ease-in-out infinite' }}>🎬</div>
          <h2 style={{ marginBottom: 8 }}>Creating Your Videos</h2>
          <p style={{ color: 'var(--gray)', marginBottom: 24 }}>{status}</p>
          <div style={{ maxWidth: 400, margin: '0 auto' }}>
            <div className="progress-bar">
              <div className="progress-fill" style={{ width: `${progress}%` }} />
            </div>
            <p style={{ color: 'var(--gray)', fontSize: 13, marginTop: 8 }}>{progress}%</p>
          </div>
        </div>
      );
    }

    // ─── Captions Screen ───────────────────────────────────────
    const TONE_META = {
      engaging:      { icon: '✨', label: 'Engaging' },
      professional:  { icon: '💼', label: 'Professional' },
      witty:         { icon: '😏', label: 'Witty' },
      inspirational: { icon: '🌟', label: 'Inspirational' },
      storyteller:   { icon: '📖', label: 'Storyteller' }
    };

    function CaptionsScreen({ captionData, selectedItems, onUseCaption, onSkip, onRegenerate }) {
      const [activeTab, setActiveTab] = useState('engaging');
      const [editedCaptions, setEditedCaptions] = useState({});
      const [loading, setLoading] = useState(!captionData);
      const [regenerating, setRegenerating] = useState(false);
      const [copied, setCopied] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (captionData && captionData.captions) {
          // When regenerating, replace all captions; otherwise only fill empty ones
          setEditedCaptions(prev => {
            if (regenerating) return { ...captionData.captions };
            const updated = { ...prev };
            Object.keys(captionData.captions).forEach(key => {
              if (!updated[key]) updated[key] = captionData.captions[key];
            });
            return updated;
          });
          setLoading(false);
          setRegenerating(false);
          // Show error banner if it fell back
          if (captionData.source === 'fallback' && captionData.error) {
            setError('AI captions unavailable — showing templates. Try regenerating.');
          } else if (captionData.source === 'ai-partial') {
            setError('Some tones fell back to templates. AI returned partial results.');
          } else {
            setError(null);
          }
        }
      }, [captionData]);

      // Timeout if captions take too long
      useEffect(() => {
        if (!loading && !regenerating) return;
        const timeout = setTimeout(() => { setLoading(false); setRegenerating(false); }, 15000);
        return () => clearTimeout(timeout);
      }, [loading, regenerating]);

      const currentCaption = editedCaptions[activeTab] || '';
      const source = captionData?.source || 'demo';
      const toneKeys = Object.keys(TONE_META);

      // Word count (split on whitespace, exclude hashtag-only tokens)
      const words = currentCaption.trim().split(/\s+/).filter(w => w && !w.startsWith('#'));
      const wordCount = currentCaption.trim() ? words.length : 0;

      function handleCopy() {
        navigator.clipboard.writeText(currentCaption).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {});
      }

      function handleRegenerate() {
        setRegenerating(true);
        setEditedCaptions({});
        setError(null);
        onRegenerate();
      }

      if (loading) {
        return (
          <div style={{ textAlign: 'center', paddingTop: '20vh' }}>
            <div style={{ fontSize: 48, marginBottom: 16, animation: 'float 2s ease-in-out infinite' }}>✍️</div>
            <h2 style={{ marginBottom: 8 }}>Generating Captions...</h2>
            <p style={{ color: 'var(--gray)' }}>AI is crafting 5 caption styles for your video.</p>
          </div>
        );
      }

      const sourceLabel = source === 'ai' ? '🤖 AI-generated' : source === 'ai-partial' ? '🤖 AI (partial)' : source === 'demo' ? '📝 Demo' : '📝 Template';

      return (
        <div style={{ paddingTop: '4vh', maxWidth: 640, margin: '0 auto' }}>
          {/* Error banner */}
          {error && (
            <div style={{
              background: '#2a1a1a', border: '1px solid #5a2a2a', borderRadius: 10,
              padding: '10px 16px', marginBottom: 16, fontSize: 14, color: '#ff8a8a',
              display: 'flex', alignItems: 'center', gap: 8
            }}>
              <span>⚠️</span> {error}
              <button onClick={() => setError(null)} style={{
                marginLeft: 'auto', background: 'none', border: 'none', color: '#ff8a8a',
                cursor: 'pointer', fontSize: 16, padding: '0 4px'
              }}>✕</button>
            </div>
          )}

          <div style={{ textAlign: 'center', marginBottom: 24 }}>
            <h2 style={{ fontSize: 28, marginBottom: 8 }}>Your Captions</h2>
            <p style={{ color: 'var(--gray)', fontSize: 15 }}>
              {sourceLabel} · 5 tones · ~30 words each · edit freely
            </p>
          </div>

          {/* Tone tabs — scrollable on mobile */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 16, overflowX: 'auto', paddingBottom: 4 }}>
            {toneKeys.map(key => (
              <button
                key={key}
                className={`caption-tab ${activeTab === key ? 'active' : ''}`}
                onClick={() => setActiveTab(key)}
                style={{ whiteSpace: 'nowrap', flex: 'none' }}
              >
                {TONE_META[key].icon} {TONE_META[key].label}
              </button>
            ))}
          </div>

          <textarea
            className="caption-textarea"
            value={currentCaption}
            onChange={e => setEditedCaptions(prev => ({ ...prev, [activeTab]: e.target.value }))}
            placeholder={regenerating ? 'Regenerating...' : 'Your caption will appear here...'}
            disabled={regenerating}
            style={regenerating ? { opacity: 0.5 } : {}}
          />

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 6 }}>
            <span style={{ fontSize: 13, color: wordCount >= 28 && wordCount <= 32 ? '#2A9D8F' : 'var(--gray)' }}>
              {wordCount} words {wordCount >= 28 && wordCount <= 32 ? '✓' : ''} · {currentCaption.length} chars
            </span>
            <div style={{ display: 'flex', gap: 6 }}>
              <button className="btn btn-secondary btn-sm" onClick={handleCopy} disabled={regenerating}>
                {copied ? '✓ Copied' : '📋 Copy'}
              </button>
              <button className="btn btn-secondary btn-sm" onClick={handleRegenerate} disabled={regenerating}
                style={regenerating ? { opacity: 0.5 } : {}}>
                {regenerating ? '⏳ Generating...' : '🔄 Regenerate'}
              </button>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 12, marginTop: 28, justifyContent: 'center' }}>
            <button className="btn btn-primary" onClick={() => onUseCaption(currentCaption)} disabled={regenerating}>
              Use This Caption →
            </button>
            <button className="btn btn-ghost" onClick={onSkip}>
              Skip Captions
            </button>
          </div>
        </div>
      );
    }

    // ─── Preview Screen ────────────────────────────────────────
    function PreviewScreen({ jobData, caption, onStartOver, showToast }) {
      const [copied, setCopied] = useState(false);

      function handleCopyCaption() {
        navigator.clipboard.writeText(caption).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {});
      }

      function handleDownload(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
      }

      function handleShare(url, title) {
        if (navigator.share) {
          navigator.share({ title, url: window.location.origin + url }).catch(() => {});
        } else {
          showToast('Share not supported on this device');
        }
      }

      if (!jobData) return null;

      return (
        <div style={{ paddingTop: '4vh' }}>
          <div style={{ textAlign: 'center', marginBottom: 24 }}>
            <h2 style={{ fontSize: 28, marginBottom: 8 }}>Your Videos Are Ready! 🎉</h2>
          </div>

          {caption && (
            <div style={{ background: 'var(--card-surface)', borderRadius: 12, padding: 16, marginBottom: 24, position: 'relative' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <span style={{ fontSize: 13, color: 'var(--gray)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Caption</span>
                <button className="btn btn-ghost btn-sm" style={{ padding: '4px 10px', fontSize: 12 }} onClick={handleCopyCaption}>
                  {copied ? '✓' : '📋'}
                </button>
              </div>
              <p style={{ fontSize: 14, lineHeight: 1.6, whiteSpace: 'pre-wrap', color: 'var(--cream)' }}>{caption}</p>
            </div>
          )}

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div className="video-card">
              <h3 style={{ fontSize: 16, marginBottom: 12 }}>Instagram Reel</h3>
              {jobData.reelUrl && (
                <video
                  src={jobData.reelUrl}
                  controls
                  preload="metadata"
                  playsInline
                  style={{ aspectRatio: '9/16', objectFit: 'contain' }}
                />
              )}
              {jobData.reelInfo && (
                <p style={{ fontSize: 12, color: 'var(--gray)', marginTop: 8 }}>
                  {jobData.reelInfo.duration?.toFixed(1)}s · {(jobData.reelInfo.size / 1024 / 1024).toFixed(1)}MB
                </p>
              )}
              <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
                <button className="btn btn-primary btn-sm" style={{ flex: 1 }} onClick={() => handleDownload(jobData.reelUrl, 'reel.mp4')}>
                  Download
                </button>
                <button className="btn btn-ghost btn-sm" onClick={() => handleShare(jobData.reelUrl, 'My ReelMaker Reel')}>
                  Share
                </button>
              </div>
            </div>

            <div className="video-card">
              <h3 style={{ fontSize: 16, marginBottom: 12 }}>YouTube Short</h3>
              {jobData.shortUrl && (
                <video
                  src={jobData.shortUrl}
                  controls
                  preload="metadata"
                  playsInline
                  style={{ aspectRatio: '9/16', objectFit: 'contain' }}
                />
              )}
              {jobData.shortInfo && (
                <p style={{ fontSize: 12, color: 'var(--gray)', marginTop: 8 }}>
                  {jobData.shortInfo.duration?.toFixed(1)}s · {(jobData.shortInfo.size / 1024 / 1024).toFixed(1)}MB
                </p>
              )}
              <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
                <button className="btn btn-primary btn-sm" style={{ flex: 1 }} onClick={() => handleDownload(jobData.shortUrl, 'short.mp4')}>
                  Download
                </button>
                <button className="btn btn-ghost btn-sm" onClick={() => handleShare(jobData.shortUrl, 'My ReelMaker Short')}>
                  Share
                </button>
              </div>
            </div>
          </div>

          <div style={{ textAlign: 'center', marginTop: 32 }}>
            <button className="btn btn-secondary" onClick={onStartOver}>
              ← Start Over
            </button>
          </div>
        </div>
      );
    }

    // ─── Render ────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
